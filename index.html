<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Droid Translator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.cdnfonts.com/css/product-sans" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4">

    <div class="w-full max-w-lg space-y-4 py-6">
        <div class="flex items-center gap-2 soft-ui p-2">
            <select id="srcLang" class="flex-1 p-3 text-sm font-medium pl-4"><option value="auto">Auto-Detect</option></select>
            <button id="swapBtn" class="p-2 text-muted">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m7 16-4-4 4-4"/><path d="M3 12h18"/><path d="m17 8 4 4-4 4"/></svg>
            </button>
            <select id="tgtLang" class="flex-1 p-3 text-sm font-medium pr-8 text-right"></select>
        </div>

        <div class="soft-ui p-6 space-y-2">
            <textarea id="input" rows="4" class="w-full text-xl placeholder-[#333] resize-none" placeholder="Введите текст..."></textarea>
            <div class="flex justify-between border-t border-[#2a2a2a] pt-3">
                <button id="speakIn" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
                <button id="clearBtn" class="text-[10px] font-bold text-muted uppercase tracking-widest">Очистить</button>
            </div>
        </div>

        <button id="go" class="w-full py-5 btn-main font-bold text-xs tracking-[0.3em] uppercase">Перевести</button>

        <div class="soft-ui p-6 min-h-[120px]">
            <div id="output" class="text-xl leading-relaxed text-[#a0a0a0] mb-4"></div>
            <div id="outActions" class="hidden flex justify-between border-t border-[#2a2a2a] pt-3">
                <button id="speakOut" class="icon-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
                </button>
                <button id="copyBtn" class="text-[10px] font-bold text-muted border border-[#333] px-5 py-2 rounded-full uppercase tracking-wider">Копировать</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
